# Application
spring.application.name=ApiTacticsApp
# We keep the fallback here so it easily runs locally without needing to set PORT
server.port=${PORT:8085}

# CORS configuration (Environment specific)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# GZIP Compression (Standard app behavior - safe to hardcode)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript,text/javascript
server.compression.min-response-size=2048

# Database (Security & Environment specific)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (Database tuning - safe to hardcode)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT (Security)
jwt.secret=${JWT_SECRET}